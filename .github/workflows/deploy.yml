name: Auto Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 3.110.130.0   # ✅ updated IP
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            /home/ubuntu/deploy/deploy.sh